<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ride Confirmed</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;

}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#11998e,#38ef7d);

overflow:hidden;

}

.card{

width:420px;

background:white;

padding:40px;

border-radius:25px;

box-shadow:0 20px 40px rgba(0,0,0,.25);

text-align:center;

animation:popup .7s ease;

}

@keyframes popup{

from{

opacity:0;
transform:scale(.6);

}

to{

opacity:1;
transform:scale(1);

}

}

.check{

width:110px;

height:110px;

margin:auto;

border-radius:50%;

background:#00C853;

display:flex;

justify-content:center;

align-items:center;

font-size:60px;

color:white;

animation:pulse 1.5s infinite;

}

@keyframes pulse{

0%{

box-shadow:0 0 0 0 rgba(0,200,83,.6);

}

70%{

box-shadow:0 0 0 25px rgba(0,200,83,0);

}

100%{

box-shadow:0 0 0 0 rgba(0,200,83,0);

}

}

h1{

margin-top:30px;

color:#222;

}

p{

margin:20px 0;

color:#555;

line-height:28px;

}

.details{

margin-top:30px;

padding:20px;

border-radius:15px;

background:#f5f5f5;

text-align:left;

}

.details p{

margin:8px 0;

}

.btn{

display:inline-block;

margin-top:25px;

padding:15px 40px;

background:#111;

color:white;

text-decoration:none;

border-radius:50px;

transition:.3s;

}

.btn:hover{

background:#00C853;

transform:translateY(-5px);

}

</style>

</head>

<body>

<div class="card">

<div class="check">

✔

</div>

<h1>Ride Confirmed</h1>

<p>

Your driver has accepted your ride request.

</p>

<div class="details">

<p><strong>Driver:</strong> John Smith</p>

<p><strong>Vehicle:</strong> Toyota Innova</p>

<p><strong>Vehicle No:</strong> AP39 AB 1234</p>

<p><strong>ETA:</strong> 3 Minutes</p>

<p><strong>Fare:</strong> ₹245</p>

</div>

<a href="/" class="btn">

Book Another Ride

</a>

</div>

</body>

</html>
